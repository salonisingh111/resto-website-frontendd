<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Savora</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-header {
            padding: 8rem 0 4rem;
            text-align: center;
            background-color: var(--secondary-bg);
            border-bottom: 1px solid var(--border-color);
        }

        .menu-container {
            padding: 4rem 0;
        }

        .menu-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-light);
            padding: 10px 20px;
            border-radius: 30px;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--accent);
            color: var(--primary-bg);
            border-color: var(--accent);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .menu-item {
            background-color: var(--secondary-bg);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .menu-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.5s ease;
        }

        .menu-item .img-wrapper {
            overflow: hidden;
        }

        .menu-item:hover img {
            transform: scale(1.05);
        }

        .item-details {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .item-title {
            font-size: 1.3rem;
            font-family: 'Playfair Display', serif;
            color: var(--accent);
        }

        .veg-tag {
            font-size: 0.7rem;
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 8px;
            display: inline-block;
        }
        .veg { background-color: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .non-veg { background-color: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }

        .item-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            flex-grow: 1;
        }
        
        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .price {
            font-size: 1.2rem;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="brand">Savora.</a>
            <button class="hamburger">☰</button>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="menu.html" style="color: var(--accent);">Menu</a>
                <a href="about.html">About</a>
                <a href="cart.html" class="cart-icon">🛒 <span class="cart-count">0</span></a>
            </div>
        </div>
    </nav>

    <header class="page-header gsap-fade-up">
        <h1 class="section-title" style="margin-bottom: 0;">Our Menu</h1>
        <p style="color: var(--text-muted); margin-top: 10px;">Exquisite flavors, thoughtfully prepared.</p>
    </header>

    <section class="menu-container container">
        
        <div class="menu-tabs gsap-fade-up">
            <button class="tab-btn active" data-target="all">All</button>
            <button class="tab-btn" data-target="veg" style="border-color: #2ecc71; color: #2ecc71;">Veg 🌿</button>
            <button class="tab-btn" data-target="non-veg" style="border-color: #e74c3c; color: #e74c3c;">Non-Veg 🍗</button>
            <button class="tab-btn" data-target="starters">Starters</button>
            <button class="tab-btn" data-target="mains">Mains</button>
            <button class="tab-btn" data-target="breads">Breads</button>
            <button class="tab-btn" data-target="desserts">Desserts</button>
            <button class="tab-btn" data-target="drinks">Drinks</button>
        </div>

        <div class="menu-grid" id="menu-grid">
            <!-- Items rendered via JS to allow filtering -->
        </div>

    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-col">
                <h2 class="brand">Savora.</h2>
                <p>Taste the extraordinary.</p>
            </div>
            <div class="footer-col">
                <h4>Explore</h4>
                <a href="index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="about.html">About Us</a>
            </div>
            <div class="footer-col">
                <h4>Contact</h4>
                <p>123 Culinary Blvd, NY</p>
                <p>hello@savora.com</p>
                <p>+1 (555) 123-4567</p>
            </div>
        </div>
        <p style="color: var(--text-muted); font-size: 0.9rem;">&copy; 2026 Savora Restaurant. All rights reserved.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
    <script>
        const grid = document.getElementById('menu-grid');
        const tabs = document.querySelectorAll('.tab-btn');

        function renderMenu(filter = 'all') {
            grid.innerHTML = '';
            
            let filtered = productsDB;
            if (filter === 'veg') {
                filtered = productsDB.filter(p => p.type === 'veg');
            } else if (filter === 'non-veg') {
                filtered = productsDB.filter(p => p.type === 'non-veg');
            } else if (filter !== 'all') {
                filtered = productsDB.filter(p => p.category === filter);
            }
            
            filtered.forEach((p, idx) => {
                const isVeg = p.type === 'veg';
                const tagClass = isVeg ? 'veg' : 'non-veg';
                const tagText = isVeg ? 'VEG' : 'NON-VEG';

                const card = document.createElement('div');
                card.className = 'menu-item gsap-fade-up';
                // Delay based on index for cascade effect
                if (filter !== 'all') {
                    card.style.animationDelay = `${idx * 0.1}s`;
                }

                card.innerHTML = `
                    <div class="img-wrapper">
                        <a href="product.html?id=${p.id}"><img src="${p.img}" alt="${p.name}"></a>
                    </div>
                    <div class="item-details">
                        <span class="veg-tag ${tagClass}">${tagText}</span>
                        <div class="item-header">
                            <a href="product.html?id=${p.id}"><h3 class="item-title">${p.name}</h3></a>
                        </div>
                        <p class="item-desc">${p.desc}</p>
                        <div class="item-footer">
                            <span class="price">₹${p.price}</span>
                            <button class="btn" style="padding: 8px 16px; font-size: 0.9rem;" onclick='addToCart(${JSON.stringify({id: p.id, name: p.name, price: p.price, image: p.img})})'>Add</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            // Re-trigger GSAP for newly added elements
            if(window.gsap && window.ScrollTrigger) {
                ScrollTrigger.refresh();
                gsap.fromTo('.menu-item', 
                    { y: 30, opacity: 0 }, 
                    { y: 0, opacity: 1, duration: 0.6, stagger: 0.1, ease: "power2.out" }
                );
            }
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                tabs.forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                renderMenu(e.target.getAttribute('data-target'));
            });
        });

        // Initial Render
        renderMenu();

    </script>
</body>
</html>
